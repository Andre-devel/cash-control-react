<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Cash Control — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="styles-mobile.css"/>
<style>
  html, body { background: #1a1916; }
  /* Push iOS device frame content background to dark instead of iOS gray */
  .ios-content-wrap { background: var(--bg); }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Shared primitives + data -->
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="data.jsx"></script>

<!-- Mobile screens + frames -->
<script type="text/babel" src="screens-mobile.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

const PHONE_W = 390;
const PHONE_H = 844;

function Phone({ children, dark = true }) {
  return (
    <IOSDevice width={PHONE_W} height={PHONE_H} dark={dark}>
      <div style={{ height: "100%", background: "var(--bg)" }}>
        {children}
      </div>
    </IOSDevice>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="auth" title="Onboarding" subtitle="Entrar & criar conta">
        <DCArtboard id="login" label="01 · Login / Registro" width={PHONE_W} height={PHONE_H}>
          <Phone><MBLogin/></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="core" title="Núcleo do app" subtitle="Fluxo principal — 4 telas conectadas pela tab bar inferior">
        <DCArtboard id="dashboard" label="02 · Início (Dashboard)" width={PHONE_W} height={PHONE_H}>
          <Phone><MBDashboard/></Phone>
        </DCArtboard>
        <DCArtboard id="transactions" label="03 · Transações" width={PHONE_W} height={PHONE_H}>
          <Phone><MBTransactions/></Phone>
        </DCArtboard>
        <DCArtboard id="accounts" label="05 · Contas" width={PHONE_W} height={PHONE_H}>
          <Phone><MBAccounts/></Phone>
        </DCArtboard>
        <DCArtboard id="cards" label="06 · Cartões + Fatura" width={PHONE_W} height={PHONE_H}>
          <Phone><MBCards/></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="modals" title="Modal / Bottom sheet" subtitle="A criação de transações vira um bottom sheet com entrada de valor centralizada">
        <DCArtboard id="new-tx" label="04 · Nova transação (bottom sheet)" width={PHONE_W} height={PHONE_H}>
          <Phone><MBNewTransaction/></Phone>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
